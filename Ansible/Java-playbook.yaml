- name: Java deployment
  hosts: all
  become: true

  tasks:
    - name: install java
      apt:
        name: openjdk:11-jdk
        state: present
    
    - name: copy jar file
      copy:
        src: app.jar
        dest: /app/app.jar

    - name: run java application
      command: java -jar /app/app.jar
